      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: idp-server
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: idp-server
      initContainers:
        - name: wait-for-deps
          image: docker.m.daocloud.io/library/busybox:1.36
          command:
            - sh
            - -ec
            - |
              echo "Waiting for MySQL (idp-mysql:3306)..."
              until nc -w 2 idp-mysql 3306 </dev/null 2>/dev/null; do sleep 2; done
              echo "Waiting for Redis (idp-redis:6379)..."
              until nc -w 2 idp-redis 6379 </dev/null 2>/dev/null; do sleep 2; done
              echo "All dependencies ready."
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: server
          image: idp-server:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: idp-runtime-config
            - secretRef:
                name: idp-runtime-secret
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: signing-keys
              mountPath: /var/lib/idp/signing-keys
      volumes:
        - name: signing-keys
          persistentVolumeClaim:
            claimName: idp-signing-keys
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: idp-mysql-ingress
  namespace: idp-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: idp-mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: idp-server
      ports:
        - protocol: TCP
          port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: idp-redis-ingress
  namespace: idp-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: idp-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: idp-server
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: idp-server-ingress
  namespace: idp-system
  labels:
    app.kubernetes.io/name: idp-server
    app.kubernetes.io/part-of: idp-stack
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: idp-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: idp-server-pdb
  namespace: idp-system
  labels:
    app.kubernetes.io/name: idp-server
    app.kubernetes.io/part-of: idp-stack
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-server
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: idp-server
  namespace: idp-system
  labels:
    app.kubernetes.io/name: idp-server
    app.kubernetes.io/part-of: idp-stack
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: idp-system-idp-redirect-https@kubernetescrd
spec:
  rules:
    - host: www.siennesg.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: idp-server
                port:
                  number: 8080
    - host: siennesg.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: idp-server
                port:
                  number: 8080
  tls:
    - hosts:
        - www.siennesg.online
        - siennesg.online
      secretName: idp-tls-cert
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: idp-redirect-https
  namespace: idp-system
  labels:
    app.kubernetes.io/part-of: idp-stack
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
