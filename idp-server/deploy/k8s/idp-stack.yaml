apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: idp-redis
  namespace: idp-system
  labels:
    app.kubernetes.io/name: idp-redis
    app.kubernetes.io/part-of: idp-stack
spec:
  serviceName: idp-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-redis
        app.kubernetes.io/part-of: idp-stack
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: idp-redis:latest
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --requirepass
            - "$(REDIS_PASSWORD)"
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: idp-runtime-secret
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app.kubernetes.io/part-of: idp-stack
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
