apiVersion: v1
kind: Service
metadata:
  name: idp-mysql
  namespace: idp-system
  labels:
    app.kubernetes.io/name: idp-mysql
    app.kubernetes.io/part-of: idp-stack
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: idp-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: idp-mysql
  namespace: idp-system
  labels:
    app.kubernetes.io/name: idp-mysql
    app.kubernetes.io/part-of: idp-stack
spec:
  serviceName: idp-mysql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-mysql
        app.kubernetes.io/part-of: idp-stack
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysql
          image: idp-db:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: idp-runtime-config
            - secretRef:
                name: idp-runtime-secret
          ports:
            - name: mysql
              containerPort: 3306
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: mysql-init
          configMap:
            name: idp-mysql-init
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app.kubernetes.io/part-of: idp-stack
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
